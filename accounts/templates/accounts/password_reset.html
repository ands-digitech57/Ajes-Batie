{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 p-4">
                <h3 class="fw-bold text-center mb-3">Mot de passe oublié ?</h3>
                <p class="text-muted text-center small mb-4">Saisissez votre adresse e-mail ci-dessous. Nous vous enverrons un lien pour créer un nouveau mot de passe.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label small fw-semibold">Adresse e-mail</label>
                        <input type="email" name="email" id="id_email" class="form-control" placeholder="exemple@domaine.com" required autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Envoyer le lien de récupération</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
