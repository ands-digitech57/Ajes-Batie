{% extends 'base.html' %}

{% block content %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 p-5">
                <div class="text-success fs-1 mb-3">✅</div>
                <h3 class="fw-bold mb-3">Mot de passe modifié !</h3>
                <p class="text-muted small mb-4">Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter à votre espace.</p>
                <a href="{% url 'login' %}" class="btn btn-primary px-4 py-2 fw-bold">Se connecter</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
