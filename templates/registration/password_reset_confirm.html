{% extends 'base.html' %}

{% block title %}Modifier le mot de passe | Ajes Connect{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-panel">
        <p class="eyebrow">Nouveau mot de passe</p>
        <h1>Définissez un nouveau mot de passe</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Modifier le mot de passe</button>
        </form>
        <p class="muted"><a href="{% url 'accounts:login' %}">Retour à la connexion</a></p>
    </div>
</section>
{% endblock %}
