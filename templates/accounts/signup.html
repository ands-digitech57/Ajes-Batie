{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion | Ajes Connect{% endblock %}

{% block content %}
<!-- POSITIONNEMENT ABSOLU AU CENTRE DE L'ÉCRAN (STYLE INSTAGRAM DE CAPTURE_2.PNG) -->
<div id="insta-login-wrapper" style="position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; display: flex !important; justify-content: center !important; align-items: center !important; background-color: #ffffff !important; z-index: 9999 !important; box-sizing: border-box !important;">
    
    <!-- BLOC CENTRAL COMPACT -->
    <div style="width: 100% !important; max-width: 350px !important; padding: 0 20px !important; box-sizing: border-box !important; text-align: center !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;">
        
        <!-- En-tête avec flèche retour et titre -->
        <div style="display: flex !important; align-items: center !important; justify-content: center !important; margin-bottom: 30px !important; position: relative !important;">
            <a href="/" style="position: absolute !important; left: 0 !important; text-decoration: none !important; color: #000000 !important; font-size: 1.5rem !important; font-weight: 300 !important; line-height: 1 !important;">
                ‹
            </a>
            <h1 style="font-size: 1.1rem !important; font-weight: 700 !important; color: #000000 !important; margin: 0 !important; letter-spacing: -0.2px !important;">
                Se connecter à Ajes Connect
            </h1>
        </div>

        <!-- Formulaire -->
        <form method="post" action="" style="margin: 0 !important; padding: 0 !important;">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div style="color: #ed4956 !important; font-size: 0.85rem !important; margin-bottom: 15px !important; text-align: center !important;">
                    Identifiants incorrects. Veuillez réessayer.
                </div>
            {% endif %}

            <!-- Champ Identifiant -->
            <div style="margin-bottom: 12px !important;">
                <input type="text" name="username" id="id_username" placeholder="Numéro de mobile, nom de profil ou adresse e-mail" required 
                       style="width: 100% !important; height: 50px !important; background: #fafafa !important; border: 1px solid #dbdbdb !important; border-radius: 12px !important; padding: 0 16px !important; font-size: 0.9rem !important; outline: none !important; box-sizing: border-box !important; color: #262626 !important;">
            </div>

            <!-- Champ Mot de passe -->
            <div style="margin-bottom: 20px !important;">
                <input type="password" name="password" id="id_password" placeholder="Mot de passe" required 
                       style="width: 100% !important; height: 50px !important; background: #fafafa !important; border: 1px solid #dbdbdb !important; border-radius: 12px !important; padding: 0 16px !important; font-size: 0.9rem !important; outline: none !important; box-sizing: border-box !important; color: #262626 !important;">
            </div>

            <!-- Bouton bleu arrondi de la Capture_2.PNG -->
            <button type="submit" 
                    style="width: 100% !important; height: 44px !important; background-color: #0095f6 !important; opacity: 0.7 !important; color: #ffffff !important; border: none !important; border-radius: 22px !important; font-weight: 700 !important; font-size: 0.95rem !important; cursor: pointer !important; transition: opacity 0.2s !important;"
                    onmouseover="this.style.opacity='1'" 
                    onmouseout="this.style.opacity='0.7'">
                Se connecter
            </button>
        </form>

        <!-- Lien Mot de passe oublié -->
        <div style="margin-top: 24px !important;">
            <a href="{% url 'accounts:password_reset' %}" style="color: #00376b !important; text-decoration: none !important; font-size: 0.85rem !important; font-weight: 500 !important;">
                Mot de passe oublié ?
            </a>
        </div>

    </div>
</div>
{% endblock %}
